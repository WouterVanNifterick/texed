name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages, and cancel superseded runs.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: texed-ts
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: texed-ts/package.json
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: texed-ts/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: texed-ts/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
