name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: texed-ts
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: texed-ts/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: texed-ts/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    defaults:
      run:
        working-directory: texed-ts
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: texed-ts/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: texed-ts/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e
