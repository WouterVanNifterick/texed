<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Dexed Web">
  <defs>
    <linearGradient id="bg" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1b1f2a"/>
      <stop offset="100%" stop-color="#0d0f14"/>
    </linearGradient>
    <radialGradient id="carrier-glow" cx="32" cy="38" r="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffb454" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffb454" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="#2a2f3d" stroke-width="1"/>

  <!-- FM operator graph (DX-style algorithm tree) -->
  <g stroke="#4a5060" stroke-width="1.6" stroke-linecap="round">
    <path d="M32 40 L22 26"/>
    <path d="M32 40 L42 26"/>
    <path d="M22 26 L16 16"/>
    <path d="M42 26 L48 16"/>
    <path d="M32 40 L32 52"/>
  </g>

  <circle cx="16" cy="16" r="3.5" fill="#3a4051"/>
  <circle cx="48" cy="16" r="3.5" fill="#3a4051"/>
  <circle cx="22" cy="26" r="4.5" fill="#565d70"/>
  <circle cx="42" cy="26" r="4.5" fill="#565d70"/>

  <circle cx="32" cy="40" r="14" fill="url(#carrier-glow)"/>
  <circle cx="32" cy="40" r="7.5" fill="#ffb454" filter="url(#glow)"/>
  <circle cx="32" cy="40" r="7.5" fill="none" stroke="#ffd79a" stroke-width="0.75" opacity="0.55"/>

  <!-- output / keyboard accent -->
  <rect x="14" y="52" width="36" height="3" rx="1.5" fill="#ffb454" opacity="0.35"/>
  <rect x="20" y="56" width="24" height="2" rx="1" fill="#6ee7a0" opacity="0.25"/>
</svg>
